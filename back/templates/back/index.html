<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackhole Megalaser</title>
</head>

<body>
    {% if user.is_authenticated %}
    <p><a href="/accounts/profile">{{ user.username }} - see my profile</a></p>
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit">Log Out</button>
    </form>
    {% else %}
    <p><a href="/accounts/login">Login</a> <a href="/accounts/signup">Sign Up</a></p>
    {% endif %}
</body>

</html>
