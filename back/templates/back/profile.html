{% load static %}
<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - {{ user.username }} - Blackhole Megalaser</title>
    <link rel="icon" href="{% static 'back/favicon.ico' %}">
</head>

<body>
    <h2>Hello, {{ user.username }}!</h2>
    <p>Welcome to Blackhole Megalaser</p>
    <p>Your email is: {{ user.email }}</p>
    <p><a href="/">Home</a></p>
    <p><a href="/accounts/modify">Change my information</a></p>
    <p><a href="/accounts/password_change">Change my password</a></p>
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit">Log Out</button>
    </form>
</body>

</html>
