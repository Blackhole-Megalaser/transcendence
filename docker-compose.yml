services:
  db:
    image: postgres:17
    restart: unless-stopped
    # set shared memory limit when using docker compose
    shm_size: 128mb
    env_file: .env
    ports:
      - 5432:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 1s
      timeout: 1s
      retries: 180

  back:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8000:8000
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .jj
            - .git
